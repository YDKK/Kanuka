name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Evaluate release signing availability
        id: signing
        shell: bash
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" && -n "${ANDROID_KEYSTORE_PASSWORD}" && -n "${ANDROID_KEY_ALIAS}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release keystore
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build signed release APK
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        env:
          KANUKA_UPLOAD_STORE_FILE: ${{ runner.temp }}/release-keystore.jks
          KANUKA_UPLOAD_STORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          KANUKA_UPLOAD_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          KANUKA_UPLOAD_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace

      - name: Build unsigned release APK (signing secrets not configured)
        if: ${{ steps.signing.outputs.enabled != 'true' }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

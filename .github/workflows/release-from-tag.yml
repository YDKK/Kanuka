name: Release from Tag

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$ ]]; then
            echo "Unsupported tag format: ${TAG_NAME}" >&2
            exit 1
          fi
          VERSION_NAME="${TAG_NAME#v}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Evaluate release signing availability
        id: signing
        shell: bash
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" && -n "${ANDROID_KEYSTORE_PASSWORD}" && -n "${ANDROID_KEY_ALIAS}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release keystore
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build signed release artifacts
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        env:
          KANUKA_UPLOAD_STORE_FILE: ${{ runner.temp }}/release-keystore.jks
          KANUKA_UPLOAD_STORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          KANUKA_UPLOAD_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          KANUKA_UPLOAD_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease -PkanukaVersionTag=${{ steps.version.outputs.tag_name }} --stacktrace

      - name: Build unsigned release artifacts (signing secrets not configured)
        if: ${{ steps.signing.outputs.enabled != 'true' }}
        run: |
          ./gradlew assembleRelease bundleRelease -PkanukaVersionTag=${{ steps.version.outputs.tag_name }} --stacktrace

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: kanuka-${{ steps.version.outputs.version_name }}-artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Kanuka v${{ steps.version.outputs.version_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
